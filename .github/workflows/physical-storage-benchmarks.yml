name: Physical Storage Benchmark Evidence (Scaffolding)

on:
  pull_request:
    paths:
      - ".github/workflows/physical-storage-benchmarks.yml"
      - "benchmarks/Groundwork.PhysicalStorage.Benchmarks/**"
      - "src/Groundwork/**"
      - "tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/**"
      - "Build.props"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "Groundwork.slnx"
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: physical-storage-benchmarks-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  smoke:
    name: SQLite shared-form PR smoke (non-decision)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

      - name: Run narrow SQLite shared-form smoke
        run: |
          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile smoke \
            --providers sqlite \
            --forms shared \
            --workloads reused-client-point-read-batch,indexed-query,insert,optimistic-concurrency,pagination-and-count \
            --output "${RUNNER_TEMP}/physical-storage-smoke"

      - name: Upload non-promotable smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-smoke
          if-no-files-found: ignore
          retention-days: 14

  scheduled-contracts:
    name: Scheduled harness contract preflight
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

  scheduled-shard:
    name: Scheduled shard ${{ matrix.provider }}/${{ matrix.form }}/n${{ matrix.dataset }}
    if: github.event_name != 'pull_request'
    needs: scheduled-contracts
    runs-on: [self-hosted, linux, x64, groundwork-benchmark]
    timeout-minutes: 280
    strategy:
      fail-fast: false
      max-parallel: 36
      matrix:
        provider: [sqlite, sqlserver, postgresql, mongodb]
        form: [shared, dedicated, entity]
        dataset: [1000, 100000, 1000000]
    env:
      SHARD_ID: ${{ matrix.provider }}-${{ matrix.form }}-n${{ matrix.dataset }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore benchmarks/Groundwork.PhysicalStorage.Benchmarks/Groundwork.PhysicalStorage.Benchmarks.csproj

      - name: Build harness
        run: dotnet build benchmarks/Groundwork.PhysicalStorage.Benchmarks/Groundwork.PhysicalStorage.Benchmarks.csproj --configuration Release --no-restore

      - name: Run deterministic scheduled shard
        run: |
          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile scheduled \
            --providers "${{ matrix.provider }}" \
            --forms "${{ matrix.form }}" \
            --workloads all \
            --dataset-sizes "${{ matrix.dataset }}" \
            --payload-padding-bytes 0 \
            --selectivity-bps 5000 \
            --independent-runs 3 \
            --output "${RUNNER_TEMP}/physical-storage-scheduled/${SHARD_ID}/evidence"

      - name: Upload non-promotable scheduled shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-scheduled-${{ github.run_id }}-${{ env.SHARD_ID }}
          path: ${{ runner.temp }}/physical-storage-scheduled/${{ env.SHARD_ID }}
          if-no-files-found: error
          retention-days: 30

  verify-and-aggregate:
    name: Verify and aggregate complete scheduled evidence
    if: ${{ always() && github.event_name != 'pull_request' }}
    needs: scheduled-shard
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Download every scheduled shard
        uses: actions/download-artifact@v4
        with:
          pattern: physical-storage-scheduled-${{ github.run_id }}-*
          path: ${{ runner.temp }}/physical-storage-scheduled-aggregate/shards
          merge-multiple: false

      - name: Verify complete matrix, worker coverage, and result equality
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import itertools
          import json
          import pathlib
          import re

          root = pathlib.Path("${{ runner.temp }}/physical-storage-scheduled-aggregate")
          shards_root = root / "shards"
          providers = ("sqlite", "sqlserver", "postgresql", "mongodb")
          provider_identities = {
              "sqlite": "groundwork.sqlite",
              "sqlserver": "groundwork.sql-server",
              "postgresql": "groundwork.postgre-sql",
              "mongodb": "groundwork.mongo-db",
          }
          forms = {
              "shared": "sharedDocuments",
              "dedicated": "dedicatedDocumentTable",
              "entity": "physicalEntityTable",
          }
          datasets = (1000, 100000, 1000000)
          workloads = (
              "clientResetPointReadBatch",
              "reusedClientPointReadBatch",
              "indexedQuery",
              "mixedCompoundOrdering",
              "insert",
              "update",
              "delete",
              "unitOfWork",
              "concurrentCreate",
              "optimisticConcurrency",
              "paginationAndCount",
              "backfillMigration",
              "clientRestartValidation",
              "storageGrowth",
          )
          run_id = "${{ github.run_id }}"
          expected_shards = {
              f"physical-storage-scheduled-{run_id}-{provider}-{form}-n{dataset}": (provider, form, dataset)
              for provider, form, dataset in itertools.product(providers, forms, datasets)
          }
          actual_shards = {path.name for path in shards_root.iterdir() if path.is_dir()}
          if actual_shards != set(expected_shards):
              missing = sorted(set(expected_shards) - actual_shards)
              extra = sorted(actual_shards - set(expected_shards))
              raise SystemExit(f"scheduled shard set mismatch; missing={missing}, extra={extra}")

          expected_workers = set()
          for provider, form, dataset, workload in itertools.product(providers, forms, datasets, workloads):
              expected_workers.add((provider, forms[form], dataset, workload, "untimedWarmup", 0))
              for independent_run in (1, 2, 3):
                  expected_workers.add((provider, forms[form], dataset, workload, "measured", independent_run))

          actual_workers = set()
          result_digests = {}
          workload_fingerprints = {}
          git_commits = set()
          digest_pattern = re.compile(r"^[0-9a-f]{64}$")
          measured_count = 0

          for artifact_name, (provider, form, dataset) in sorted(expected_shards.items()):
              shard_root = shards_root / artifact_name / "evidence"
              manifest_path = shard_root / "run-group.json"
              if not manifest_path.is_file():
                  raise SystemExit(f"{artifact_name} has no run-group.json")
              manifest = json.loads(manifest_path.read_text())
              if manifest.get("promotable") is not False:
                  raise SystemExit(f"{artifact_name} makes a promotional claim")
              runs = manifest.get("runs", [])
              if len(runs) != 56:
                  raise SystemExit(f"{artifact_name} has {len(runs)} workers; expected 56")

              for entry in runs:
                  request_path = shard_root / entry["request"]
                  response_path = shard_root / entry["response"]
                  if not request_path.is_file() or not response_path.is_file():
                      raise SystemExit(f"{artifact_name} has a missing request/response artifact")
                  invocation = json.loads(request_path.read_text())
                  response = json.loads(response_path.read_text())
                  if response.get("succeeded") is not True:
                      raise SystemExit(f"{artifact_name} contains a failed worker response")

                  request = invocation["request"]
                  shape = request["dataShape"]
                  workload = request["workloads"][0]
                  role = invocation["role"]
                  independent_run = invocation["independentRun"]
                  worker = (
                      request["configuration"]["providers"][0],
                      request["configuration"]["storageForms"][0],
                      shape["datasetSize"],
                      workload,
                      role,
                      independent_run,
                  )
                  if worker in actual_workers:
                      raise SystemExit(f"duplicate scheduled worker tuple: {worker}")
                  actual_workers.add(worker)

                  if worker[0] != provider or worker[1] != forms[form] or worker[2] != dataset:
                      raise SystemExit(f"{artifact_name} contains out-of-shard worker {worker}")
                  if shape["payloadPaddingBytes"] != 0 or shape["querySelectivityBasisPoints"] != 5000:
                      raise SystemExit(f"{artifact_name} contains an unexpected data shape")

                  if role == "measured":
                      measured_count += 1
                      evidence_path = shard_root / entry["consumerEvidence"]
                      evidence_bytes = evidence_path.read_bytes()
                      evidence_digest = hashlib.sha256(evidence_bytes).hexdigest()
                      if evidence_digest != entry["consumerEvidenceDigest"]:
                          raise SystemExit(f"{artifact_name} consumer evidence digest mismatch")
                      evidence = json.loads(evidence_bytes)
                      if evidence.get("promotable") is not False:
                          raise SystemExit(f"{artifact_name} measured evidence makes a promotional claim")
                      git_commits.add(evidence["gitCommit"])
                      result = evidence["results"]
                      if len(result) != 1:
                          raise SystemExit(f"{artifact_name} worker does not contain exactly one result")
                      result = result[0]
                      expected_workload_identity = "groundwork.physical-storage/" + re.sub(
                          r"(?<!^)(?=[A-Z])",
                          "-",
                          workload,
                      ).lower()
                      if (
                          result["workloadIdentity"] != expected_workload_identity
                          or result["providerIdentity"] != provider_identities[provider]
                          or result["storageForm"] != forms[form]
                          or result["dataShape"] != shape
                          or result["independentRun"] != independent_run
                          or result["rawSampleCount"] < 1
                          or result["rawOperationLatencyCount"] < 1
                      ):
                          raise SystemExit(f"{artifact_name} consumer evidence does not match worker {worker}")
                      digest = result["resultDigest"]
                      if not digest_pattern.fullmatch(digest):
                          raise SystemExit(f"{artifact_name} has an invalid result digest")
                      digest_key = (
                          shape["datasetSize"],
                          shape["payloadPaddingBytes"],
                          shape["querySelectivityBasisPoints"],
                          workload,
                      )
                      result_digests.setdefault(digest_key, set()).add(digest)
                      workload_fingerprints.setdefault(digest_key, set()).add(result["workloadFingerprint"])

          if actual_workers != expected_workers:
              missing = sorted(expected_workers - actual_workers)
              extra = sorted(actual_workers - expected_workers)
              raise SystemExit(f"scheduled worker coverage mismatch; missing={missing[:10]}, extra={extra[:10]}")
          unequal = {key: sorted(values) for key, values in result_digests.items() if len(values) != 1}
          if unequal:
              raise SystemExit(f"cross-provider/form observable results differ: {unequal}")
          fingerprint_drift = {
              key: sorted(values)
              for key, values in workload_fingerprints.items()
              if len(values) != 1
          }
          if fingerprint_drift:
              raise SystemExit(f"cross-provider/form workload fingerprints differ: {fingerprint_drift}")
          if len(git_commits) != 1:
              raise SystemExit(f"scheduled evidence spans multiple Git commits: {sorted(git_commits)}")

          verification = {
              "contract": "groundwork.physical-storage.scheduled-coverage/v1",
              "coverageVerified": True,
              "promotable": False,
              "requiredShardCount": len(expected_shards),
              "verifiedWorkerCount": len(actual_workers),
              "verifiedMeasuredWorkerCount": measured_count,
              "resultEqualityGroupCount": len(result_digests),
              "gitCommit": next(iter(git_commits)),
          }
          (root / "coverage-verification.json").write_text(
              json.dumps(verification, indent=2, sort_keys=True) + "\n"
          )
          print(json.dumps(verification, indent=2, sort_keys=True))
          PY

      - name: Upload aggregate inputs and verification result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-scheduled-aggregate-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-scheduled-aggregate
          if-no-files-found: error
          retention-days: 30
