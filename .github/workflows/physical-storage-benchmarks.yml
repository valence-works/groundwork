name: Physical Storage Benchmarks

on:
  pull_request:
    paths:
      - ".github/workflows/physical-storage-benchmarks.yml"
      - "benchmarks/Groundwork.PhysicalStorage.Benchmarks/**"
      - "src/Groundwork/Core/**"
      - "src/Groundwork/Documents/**"
      - "src/Groundwork/Relational/**"
      - "src/Groundwork/Sqlite/**"
      - "src/Groundwork/SqlServer/**"
      - "src/Groundwork/PostgreSql/**"
      - "src/Groundwork/MongoDb/**"
      - "tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/**"
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: physical-storage-benchmarks-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  smoke:
    name: SQLite smoke matrix
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

      - name: Run smoke matrix
        run: |
          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile smoke \
            --providers sqlite \
            --forms all \
            --workloads all \
            --output "${RUNNER_TEMP}/physical-storage-smoke"

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-smoke
          if-no-files-found: ignore
          retention-days: 14

  scheduled:
    name: Four-provider scheduled matrix
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, x64, groundwork-benchmark]
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

      - name: Download approved baseline
        id: baseline
        env:
          BASELINE_URL: ${{ vars.GROUNDWORK_BENCHMARK_BASELINE_URL }}
        run: |
          if [[ -z "$BASELINE_URL" ]]; then
            echo "No approved baseline URL is configured; this run will produce candidate evidence only."
            echo "directory=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$BASELINE_URL" != https://* ]]; then
            echo "GROUNDWORK_BENCHMARK_BASELINE_URL must use HTTPS." >&2
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/physical-storage-baseline"
          curl --fail --location --silent --show-error "$BASELINE_URL" --output "${RUNNER_TEMP}/baseline.zip"
          unzip -q "${RUNNER_TEMP}/baseline.zip" -d "${RUNNER_TEMP}/physical-storage-baseline"
          manifest="$(find "${RUNNER_TEMP}/physical-storage-baseline" -name manifest.json -type f -print -quit)"
          if [[ -z "$manifest" ]]; then
            echo "The approved baseline archive does not contain manifest.json." >&2
            exit 1
          fi
          echo "directory=$(dirname "$manifest")" >> "$GITHUB_OUTPUT"

      - name: Run scheduled candidate and confirmation
        env:
          BASELINE_DIRECTORY: ${{ steps.baseline.outputs.directory }}
        run: |
          baseline_args=()
          if [[ -n "$BASELINE_DIRECTORY" ]]; then
            baseline_args=(--baseline "$BASELINE_DIRECTORY")
          fi

          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile scheduled \
            --providers all \
            --forms all \
            --workloads all \
            --output "${RUNNER_TEMP}/physical-storage-scheduled/candidate" \
            "${baseline_args[@]}"

          if [[ -z "$BASELINE_DIRECTORY" ]]; then
            exit 0
          fi
          decision="${RUNNER_TEMP}/physical-storage-scheduled/candidate/reports/elsa-migration-decision.json"
          if jq -e '.regressions | any(.isComparable == false)' "$decision" >/dev/null; then
            echo "Candidate is not comparable with the approved baseline." >&2
            exit 1
          fi
          if jq -e '.regressionDetected == true' "$decision" >/dev/null; then
            dotnet run --configuration Release --no-build \
              --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
              -- run \
              --profile scheduled \
              --providers all \
              --forms all \
              --workloads all \
              --output "${RUNNER_TEMP}/physical-storage-scheduled/confirmation" \
              --baseline "$BASELINE_DIRECTORY" \
              --confirm-regression
          fi

      - name: Upload scheduled evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-scheduled-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-scheduled
          if-no-files-found: ignore
          retention-days: 30
