name: Physical Storage Benchmark Evidence (Scaffolding)

on:
  pull_request:
    paths:
      - ".github/workflows/physical-storage-benchmarks.yml"
      - "benchmarks/Groundwork.PhysicalStorage.Benchmarks/**"
      - "src/Groundwork/**"
      - "tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/**"
      - "Build.props"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "Groundwork.slnx"
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: physical-storage-benchmarks-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  smoke:
    name: SQLite smoke evidence (non-decision)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

      - name: Run smoke matrix
        run: |
          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile smoke \
            --providers sqlite \
            --forms all \
            --workloads all \
            --output "${RUNNER_TEMP}/physical-storage-smoke"

      - name: Upload non-promotable smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-smoke
          if-no-files-found: ignore
          retention-days: 14

  scheduled:
    name: Four-provider scheduled evidence (non-gating scaffold)
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, x64, groundwork-benchmark]
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj

      - name: Test harness contracts
        run: dotnet test tests/Groundwork/Groundwork.PhysicalStorage.Benchmarks.Tests/Groundwork.PhysicalStorage.Benchmarks.Tests.csproj --configuration Release --no-restore

      - name: Run scheduled harness evidence
        run: |
          dotnet run --configuration Release --no-build \
            --project benchmarks/Groundwork.PhysicalStorage.Benchmarks \
            -- run \
            --profile scheduled \
            --providers all \
            --forms all \
            --workloads all \
            --output "${RUNNER_TEMP}/physical-storage-scheduled/evidence"

          echo "This workflow validates harness execution only. Its artifacts are non-promotable and must not gate an Elsa migration decision."

      - name: Upload non-promotable scheduled evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physical-storage-scheduled-${{ github.run_id }}
          path: ${{ runner.temp }}/physical-storage-scheduled
          if-no-files-found: ignore
          retention-days: 30
