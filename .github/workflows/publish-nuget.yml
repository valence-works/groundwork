name: Publish NuGet Packages

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  MAIN_NUGET_SOURCE: ${{ vars.MAIN_NUGET_SOURCE || 'https://api.nuget.org/v3/index.json' }}
  FEEDZ_NUGET_SOURCE: ${{ vars.FEEDZ_NUGET_SOURCE }}

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}"
          } else {
            $baseVersion = "0.0.1"

            if (Test-Path "Build.props") {
              [xml]$buildProps = Get-Content "Build.props"
              $configuredBaseVersion = $buildProps.SelectSingleNode("//BaseVersion")?.InnerText

              if (-not [string]::IsNullOrWhiteSpace($configuredBaseVersion)) {
                $baseVersion = $configuredBaseVersion.Trim()
              }
            }

            $version = "$baseVersion-preview.${{ github.run_number }}"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Package version could not be resolved."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Groundwork.slnx

      - name: Build
        run: >-
          dotnet build Groundwork.slnx
          --configuration Release
          --no-restore
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Test core packages
        run: |
          dotnet test tests/Groundwork/Groundwork.Tests/Groundwork.Tests.csproj --configuration Release --no-build
          dotnet test tests/Groundwork/Groundwork.Sqlite.Tests/Groundwork.Sqlite.Tests.csproj --configuration Release --no-build
          dotnet test tests/Groundwork/Groundwork.SchemaTool.Tests/Groundwork.SchemaTool.Tests.csproj --configuration Release --no-build
          dotnet test samples/Groundwork.SupportTickets.Tests/Groundwork.SupportTickets.Tests.csproj --configuration Release --no-build

      - name: Test schema tool provider parity
        timeout-minutes: 20
        run: >-
          dotnet test
          tests/Groundwork/Groundwork.SchemaTool.ProviderTests/Groundwork.SchemaTool.ProviderTests.csproj
          --configuration Release
          --no-build
          --filter Category=SchemaToolProviderParity

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts/packages
          while IFS= read -r -d '' project; do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output artifacts/packages \
              /p:PackageVersion=${{ steps.version.outputs.version }}
          done < <(find src/Groundwork -name '*.csproj' -print0 | sort -z)

      - name: Verify packed tool version
        shell: bash
        run: |
          dotnet tool install \
            --tool-path artifacts/tool-smoke \
            --add-source artifacts/packages \
            --version "${{ steps.version.outputs.version }}" \
            Groundwork.Tool
          expected="Groundwork.Tool ${{ steps.version.outputs.version }}"
          actual="$(artifacts/tool-smoke/groundwork --version)"
          if [[ "$actual" != "$expected" ]]; then
            echo "Expected '$expected', got '$actual'." >&2
            exit 1
          fi

      - name: Publish to Feedz.io
        env:
          FEEDZ_API_KEY: ${{ secrets.FEEDZ_API_KEY }}
          FEEDZ_NUGET_SOURCE: ${{ env.FEEDZ_NUGET_SOURCE }}
        run: |
          if [[ -z "$FEEDZ_NUGET_SOURCE" ]]; then
            echo "Missing FEEDZ_NUGET_SOURCE repository variable." >&2
            exit 1
          fi

          if [[ -z "$FEEDZ_API_KEY" ]]; then
            echo "Missing FEEDZ_API_KEY repository secret." >&2
            exit 1
          fi

          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "$FEEDZ_API_KEY" \
            --source "$FEEDZ_NUGET_SOURCE" \
            --skip-duplicate

      - name: Publish to main NuGet feed
        if: github.event_name == 'release'
        env:
          MAIN_NUGET_API_KEY: ${{ secrets.MAIN_NUGET_API_KEY || secrets.NUGET_API_KEY }}
          MAIN_NUGET_SOURCE: ${{ env.MAIN_NUGET_SOURCE }}
        run: |
          if [[ -z "$MAIN_NUGET_SOURCE" ]]; then
            echo "Missing MAIN_NUGET_SOURCE repository variable." >&2
            exit 1
          fi

          if [[ -z "$MAIN_NUGET_API_KEY" ]]; then
            echo "Missing MAIN_NUGET_API_KEY or NUGET_API_KEY repository secret." >&2
            exit 1
          fi

          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "$MAIN_NUGET_API_KEY" \
            --source "$MAIN_NUGET_SOURCE" \
            --skip-duplicate
