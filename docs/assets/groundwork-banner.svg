<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2172 724" role="img" aria-labelledby="title desc">
  <title id="title">Groundwork architectural blueprint banner</title>
  <desc id="desc">A refined parchment blueprint banner for Groundwork, with editorial typography and a fine-line persistence system plan.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efe8d4"/>
      <stop offset="0.55" stop-color="#e9dfc6"/>
      <stop offset="1" stop-color="#d8c89d"/>
    </linearGradient>

    <radialGradient id="wash" cx="47%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f8efd7" stop-opacity="0.95"/>
      <stop offset="0.72" stop-color="#d8c99f" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6f582d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="edge" cx="50%" cy="52%" r="78%">
      <stop offset="0.74" stop-color="#231a10" stop-opacity="0"/>
      <stop offset="1" stop-color="#231a10" stop-opacity="0.18"/>
    </radialGradient>

    <pattern id="minorGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7f735c" stroke-width="0.7" opacity="0.18"/>
    </pattern>

    <pattern id="majorGrid" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M160 0H0V160" fill="none" stroke="#6d6048" stroke-width="1" opacity="0.2"/>
    </pattern>

    <pattern id="paperFibers" width="260" height="140" patternUnits="userSpaceOnUse">
      <path d="M-18 34C38 23 73 44 129 31C178 19 219 31 279 22" fill="none" stroke="#937b4e" stroke-width="0.8" opacity="0.13"/>
      <path d="M-12 102C48 115 93 93 145 104C190 113 225 99 278 108" fill="none" stroke="#937b4e" stroke-width="0.8" opacity="0.11"/>
    </pattern>

    <style>
      svg {
        shape-rendering: geometricPrecision;
        text-rendering: geometricPrecision;
      }

      .serif {
        font-family: Georgia, "Times New Roman", serif;
      }

      .sans {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .ink {
        fill: #211a12;
      }

      .muted {
        fill: #6e604b;
      }

      .gold {
        fill: #a87926;
      }

      .line {
        fill: none;
        stroke: #211a12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .draft {
        fill: none;
        stroke: #a87926;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .quiet {
        fill: none;
        stroke: #756952;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .micro {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 4px;
      }

      .tiny {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2.3px;
      }
    </style>
  </defs>

  <rect width="2172" height="724" fill="url(#paper)"/>
  <rect width="2172" height="724" fill="url(#minorGrid)"/>
  <rect width="2172" height="724" fill="url(#majorGrid)"/>
  <rect width="2172" height="724" fill="url(#paperFibers)"/>
  <ellipse cx="1036" cy="314" rx="910" ry="360" fill="url(#wash)"/>
  <rect width="2172" height="724" fill="url(#edge)"/>

  <rect width="2172" height="8" fill="#211a12"/>
  <line x1="0" y1="54" x2="2172" y2="54" class="quiet" stroke-width="1" opacity="0.35"/>

  <g class="sans tiny" fill="#9a8a6d">
    <circle cx="563" cy="30" r="5" fill="#a87926"/>
    <text x="579" y="34" class="ink">GROUNDWORK FOUNDATION</text>
    <text x="764" y="34" fill="#a87926">01. INTRO</text>
    <text x="870" y="34">02. MANIFESTS</text>
    <text x="1007" y="34">03. CAPABILITIES</text>
    <text x="1176" y="34">04. PROVIDERS</text>
    <text x="1322" y="34">05. MATERIALIZE</text>
    <text x="1492" y="34">06. RUNTIME</text>
    <text x="1632" y="34">PROVISIONAL ARCHIVE · V1.0</text>
  </g>

  <g opacity="0.48">
    <path d="M34 95v-18h18" class="quiet" stroke-width="1.5"/>
    <path d="M2138 95v-18h-18" class="quiet" stroke-width="1.5"/>
    <path d="M34 664v18h18" class="quiet" stroke-width="1.5"/>
    <path d="M2138 664v18h-18" class="quiet" stroke-width="1.5"/>
  </g>

  <g transform="translate(512 194)">
    <g class="sans micro">
      <line x1="0" y1="0" x2="28" y2="0" class="draft" stroke-width="1.5"/>
      <text x="40" y="5" fill="#a87926">PLATE 01 — PERSISTENCE FOUNDATION</text>
    </g>

    <g class="serif ink">
      <text x="0" y="112" font-size="98">Groundwork</text>
      <text x="0" y="206" font-size="92" font-style="italic">Persistence</text>
    </g>

    <text x="0" y="278" class="serif muted" font-size="25" font-style="italic">Provider-neutral storage intent for .NET systems.</text>
    <text x="0" y="321" class="sans muted" font-size="17" font-weight="430">
      <tspan x="0" dy="0">Manifests describe workload shape, indexes, concurrency, and query contracts.</tspan>
      <tspan x="0" dy="29">Providers translate the same plan into relational tables or document envelopes.</tspan>
    </text>

    <line x1="0" y1="397" x2="436" y2="397" class="draft" stroke-width="1.5"/>

    <g class="sans" transform="translate(0 434)">
      <text x="0" y="0" class="ink" font-size="22">01</text>
      <text x="0" y="30" class="muted" font-size="11" font-weight="800" letter-spacing="2.4">CORE</text>
      <text x="150" y="0" class="ink" font-size="22">04</text>
      <text x="150" y="30" class="muted" font-size="11" font-weight="800" letter-spacing="2.4">PROVIDERS</text>
      <text x="326" y="0" class="ink" font-size="22">02</text>
      <text x="326" y="30" class="muted" font-size="11" font-weight="800" letter-spacing="2.4">SHAPES</text>
    </g>
  </g>

  <g transform="translate(1414 354)">
    <g opacity="0.36">
      <circle cx="0" cy="0" r="255" class="quiet" stroke-width="1" stroke-dasharray="2 10"/>
      <circle cx="0" cy="0" r="202" class="quiet" stroke-width="1" stroke-dasharray="2 8"/>
      <circle cx="0" cy="0" r="148" class="quiet" stroke-width="1" stroke-dasharray="2 8"/>
      <line x1="-286" y1="0" x2="286" y2="0" class="quiet" stroke-width="1"/>
      <line x1="0" y1="-286" x2="0" y2="286" class="quiet" stroke-width="1"/>
      <line x1="-202" y1="-202" x2="202" y2="202" class="quiet" stroke-width="1"/>
      <line x1="202" y1="-202" x2="-202" y2="202" class="quiet" stroke-width="1"/>
    </g>

    <path d="M-176 -140C-112 -190 -31 -216 51 -206C124 -197 187 -163 233 -111" class="draft" stroke-width="1.4"/>
    <path d="M-241 98C-178 182 -75 232 31 223C127 215 210 161 261 83" class="quiet" stroke-width="1.2" opacity="0.5"/>

    <g class="sans tiny" fill="#756952">
      <text x="-247" y="-42">MANIFEST</text>
      <text x="186" y="-42">QUERY</text>
      <text x="-257" y="91">CAPABILITY</text>
      <text x="166" y="135">MATERIALIZE</text>
      <text x="-74" y="-260">FIG. 01 — SYSTEM PLAN · SCALE 1:50</text>
      <text x="-239" y="266">A6</text>
      <text x="226" y="266">F6</text>
    </g>

    <g class="line" stroke-width="1.35">
      <line x1="-93" y1="-73" x2="-202" y2="-205"/>
      <line x1="79" y1="-82" x2="185" y2="-202"/>
      <line x1="112" y1="9" x2="252" y2="-8"/>
      <line x1="79" y1="89" x2="184" y2="204"/>
      <line x1="-62" y1="104" x2="-120" y2="238"/>
      <line x1="-112" y1="14" x2="-247" y2="-9"/>
      <line x1="-84" y1="82" x2="-201" y2="143"/>
    </g>

    <g>
      <circle cx="0" cy="0" r="44" fill="#e8d3a4" stroke="#a87926" stroke-width="2"/>
      <text x="0" y="-5" class="serif ink" text-anchor="middle" font-size="18" font-style="italic">Groundwork</text>
      <text x="0" y="17" class="sans gold" text-anchor="middle" font-size="9" font-weight="800" letter-spacing="2">CORE</text>
    </g>

    <g class="sans">
      <g transform="translate(-202 -205)">
        <circle r="5" fill="#efe8d4" stroke="#a87926" stroke-width="2"/>
        <text x="-66" y="-13" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">SQLITE</text>
        <text x="-54" y="3" class="muted" font-size="8" font-weight="800" letter-spacing="1.3">EMBEDDED</text>
      </g>
      <g transform="translate(185 -202)">
        <circle r="5" fill="#efe8d4" stroke="#211a12" stroke-width="2"/>
        <text x="12" y="-13" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">SQL SERVER</text>
        <text x="12" y="3" class="muted" font-size="8" font-weight="800" letter-spacing="1.3">RELATIONAL</text>
      </g>
      <g transform="translate(252 -8)">
        <circle r="5" fill="#efe8d4" stroke="#211a12" stroke-width="2"/>
        <text x="13" y="4" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">POSTGRESQL</text>
      </g>
      <g transform="translate(184 204)">
        <circle r="5" fill="#efe8d4" stroke="#211a12" stroke-width="2"/>
        <text x="12" y="4" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">MONGODB</text>
      </g>
      <g transform="translate(-120 238)">
        <circle r="5" fill="#efe8d4" stroke="#a87926" stroke-width="2"/>
        <text x="-68" y="4" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">DOCUMENTS</text>
      </g>
      <g transform="translate(-247 -9)">
        <circle r="5" fill="#efe8d4" stroke="#211a12" stroke-width="2"/>
        <text x="-62" y="4" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">TABLES</text>
      </g>
      <g transform="translate(-201 143)">
        <circle r="5" fill="#efe8d4" stroke="#211a12" stroke-width="2"/>
        <text x="-86" y="4" class="ink" font-size="10" font-weight="800" letter-spacing="1.4">ENVELOPES</text>
      </g>
    </g>
  </g>

  <g class="sans tiny" opacity="0.72">
    <text x="1175" y="222" fill="#a87926">PROVISIONAL DRAFT · REV 0.4</text>
    <rect x="1162" y="203" width="234" height="18" fill="none" stroke="#a87926" stroke-width="1" transform="rotate(-3 1279 212)"/>
    <text x="1174" y="235" fill="#756952">A1</text>
  </g>
</svg>
